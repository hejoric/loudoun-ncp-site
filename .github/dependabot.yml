version: 2
updates:
  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns:
          - '@astrojs/*'
          - 'astro'
      keystatic:
        patterns:
          - '@keystatic/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
