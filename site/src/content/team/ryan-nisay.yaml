bio: >-
  Growing up in the Potomac Falls Region, Ryan serves as the founder and
  Executive Director of the Loudoun Nature Conservation Project, the 501(c)(3)
  nonprofit he built to inspire students and communities across Loudoun County
  to become more environmentally conscious and to give back through hands-on
  service. After stepping back briefly to begin his studies, Ryan has returned
  to actively leading LNCP's day-to-day operations, guiding its branches,
  research initiatives, and partnerships as the organization continues to grow.
  He attends Cornell University with a full ride as a double major in Music and
  Biological Sciences.
