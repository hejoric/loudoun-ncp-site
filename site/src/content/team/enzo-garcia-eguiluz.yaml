bio: >-
  A Loudoun County resident, Enzo recognized early on the need for stronger
  student-led environmental leadership in his community. In 2025, he co-founded
  LNCP's NOVA Nature Conservation Branch, expanding the organization's reach
  beyond high schools and into the college community for the first time. Enzo
  now serves as Director of External Relations and Communications, leading
  LNCP's community partnerships, media presence, and inter-branch collaboration.
  He attends Northern Virginia Community College with plans to transfer to the
  University of Virginia.
