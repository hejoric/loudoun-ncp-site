name: Nawaf Shehzad
role: Director of Expansion & Operations
section: directors
branch: ''
bio: >-
  Recognizing the need for stronger student-led conservation efforts across
  Northern Virginia, Nawaf co-founded the NOVA Nature Conservation branch in
  2025 alongside Enzo, helping bring LNCP's mission to a new community of
  students and volunteers. As Director of Expansion, Nawaf leads LNCP's efforts
  to establish new branches across Loudoun County and the broader Northern
  Virginia region, identifying schools and communities where student conservation
  can take root and guiding new chapters through their early stages. He attends
  Northern Virginia Community College with plans to transfer to the University
  of Virginia.
