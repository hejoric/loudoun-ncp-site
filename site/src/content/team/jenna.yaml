name: Jenna Hamandi
role: Branch President
section: branchPresidents
branch: dominion
bio: >-
  Jenna became a member and founder of LNCP’s Dominion Branch in 2026 to
  continue the organization’s involvement across Loudoun County. Jenna is
  currently a student at Dominion and serves as the president for LNCP’s
  Dominion Branch and leads initiatives that support sustainability, create
  partnerships, and increase community engagement. She helps organize
  environmental cleanups and volunteer events that encourage students to take an
  active role in improving their local environment. Jenna works with local
  leaders and community partners and is committed to creating a lasting impact
  by promoting conservation and inspiring others to take action in preserving
  nature.
