bio: >-
  Shray joined LNCP in late 2024 as part of the Water Nitrate Study team,
  where he played an instrumental role in conducting background research and
  building the scientific foundation for the project. His early work helped
  shape what would become one of LNCP's most ambitious research efforts to date.
  Now serving as the Head of Research, Shray leads LNCP's environmental studies
  and data initiatives, guiding projects from concept to publication. Driven by
  a passion for applying science to real-world conservation challenges, he works
  to advance the organization's mission through rigorous, impactful research
  that informs both local decision-making and broader environmental advocacy.
