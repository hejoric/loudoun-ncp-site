bio: >-
  With a background in environmental sciences, Christian Shire co-founded the
  Loudoun Nature Conservation Project to address the pressing environmental
  challenges facing our community. Growing up in the Potomac Area, Christian
  co-founded LNCP to give back to his community. Christian now attends Gannon
  University majoring in Marine Biology, where he continues to contribute to
  LNCP's research division and serves in a mentorship and advisory role.
