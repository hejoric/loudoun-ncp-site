title: Water Health - Testing and Determining Health of Local Bodies of Water
authors:
  - Christian S. Shire
  - Ryan S. Nisay
date: '2024-12-07'
abstract: >-
  Ponds and rivers represent distinct aquatic ecosystems characterized by
  significant differences in size, flow, and water quality metrics through pH,
  salinity, total dissolved solids (TDS), specific gravity, temperature,
  electric current, and oxidation-reduction potential (ORP). While general
  metrics for assessing pond health are well-established, regional tolerance
  ranges can vary from commonly accepted values. This study aimed to evaluate
  the health of local ponds and rivers by comparing water quality data to
  standardized ranges and observing temporal changes in key metrics. Selecting
  three bodies of water in Loudoun County, Virginia (Living, Stagnant, and
  River), and using an all-in-one water quality tester, we measured pH,
  salinity, TDS, specific gravity, temperature, electric current, and
  oxidation-reduction potential (ORP) across three local bodies of water.
  Results indicated that all three water bodies fell within healthy ranges,
  supported by evidence of abundant wildlife and stable environmental
  conditions. No significant pollution or stress-related changes were observed,
  suggesting that these ecosystems maintain good health over time.
