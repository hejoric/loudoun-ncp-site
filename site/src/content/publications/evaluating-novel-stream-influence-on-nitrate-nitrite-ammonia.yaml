title: Evaluating Novel Stream Influence on Nitrate, Nitrite, and Ammonia Concentrations within the Potomac River
authors:
  - Ryan S. Nisay
  - Christian S. Shire
  - Carter Lepuil
date: '2026-02-19'
abstract: >-
  Nutrient enrichment remains a persistent driver of water quality impairment
  throughout the Potomac River and Chesapeake Bay watershed, motivating the
  implementation of localized stream restoration projects designed to reduce
  downstream nitrogen transport. This study assessed spatial patterns in
  dissolved inorganic nitrogen along a newly constructed stream corridor between
  River Bend Middle School and Potomac Falls High School in Loudoun County,
  Virginia. Five monitoring sites were established along a longitudinal gradient,
  including an upstream control (Site A), three locations within the restored
  reach (Sites B-D), and a downstream site (Site E). Water samples were
  collected twice daily over three weeks and analyzed for nitrate, nitrite,
  and ammonium using colorimetric methods.
