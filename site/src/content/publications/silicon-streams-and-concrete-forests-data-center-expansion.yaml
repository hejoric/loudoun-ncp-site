title: "Silicon Streams and Concrete Forests: Evaluating the Environmental, Economic, and Social Tradeoffs of AI-Driven Data Center Expansion in Northern Virginia"
authors:
  - Ryan S. Nisay
  - Shray Vij
  - Enzo Garcia-Eguiluz
  - Nawaf Shehzad
  - Christian Shire
  - Carter Lepuil
date: '2026-02-22'
abstract: >-
  The rapid expansion of AI-driven data centers has transformed Northern
  Virginia into one of the most concentrated digital infrastructure hubs in the
  world, raising new questions about the environmental and social sustainability
  of large-scale computational development. While data centers are often framed
  as intangible components of the digital economy, they function as energy- and
  water-intensive industrial systems with measurable ecological and public health
  impacts. This study evaluates the environmental, economic, and social tradeoffs
  associated with AI-driven data center expansion through an interdisciplinary
  synthesis of environmental science literature, public health research, economic
  analyses, and regional policy documents. Using Northern Virginia as a case
  study, the analysis compares widely cited economic benefits against documented
  environmental costs including energy consumption, water use, land conversion,
  and air quality impacts.
