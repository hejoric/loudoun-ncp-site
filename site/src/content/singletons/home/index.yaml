missionHeading: >-
  The deliberate act of preserving, protecting, and restoring our natural
  environment for the benefit of future generations.
missionBody: >-
  Loudoun Nature Conservation Project is a student-led nonprofit working to
  advance sustainability and ecological health across Loudoun County. We engage
  our community through education, hands-on restoration, and advocacy,
  empowering young people to become lifelong stewards of the environment.
  Through local cleanups, habitat restoration, and outreach events, we work to
  restore ecosystems and build a lasting culture of environmental
  responsibility. Made by students, for students, we're proving that the next
  generation of conservation leaders is already at work.
