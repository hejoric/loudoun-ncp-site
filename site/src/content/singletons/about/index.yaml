historyTimeline:
  - year: April 2024
    event: >-
      Loudoun Nature Conservation Project incorporated in Virginia as a
      501(c)(3) nonprofit. Founded by Ryan Nisay with co-founders Christian
      Shire and Carter Lepuil.
  - year: Summer 2024
    event: >-
      LNCP holds its first community cleanups across Loudoun County, partnering
      with local parks and schools.
  - year: Fall 2024
    event: >-
      First school branches launched at Potomac Falls High School and other
      Loudoun schools. Research division established with first water quality
      study.
  - year: December 2024
    event: >-
      First research publication: "Water Health: Testing and Determining Health
      of Local Bodies of Water" (Shire & Nisay).
  - year: '2025'
    event: >-
      Expanded to seven school and college branches including Independence,
      Dominion, Rock Ridge, Stone Bridge, NOVA, and GMU. Multiple research
      papers published on dissolved oxygen, agricultural runoff, and nitrogen
      dynamics.
  - year: '2026'
    event: >-
      LNCP surpasses 270 members, 3,122 acres cleaned, and 726,000+ social
      media impressions. New director structure established and five active
      research publications released.
