metaDescription: >-
  Learn about Loudoun Nature Conservation Project - our mission, programs,
  impact, and history as a student-led 501(c)(3) nonprofit in Loudoun County,
  Virginia.
mission: >-
  Loudoun Nature Conservation Project is a student-led nonprofit working to
  advance sustainability and ecological health across Loudoun County. We engage
  our community through education, hands-on restoration, and advocacy,
  empowering young people to become lifelong stewards of the environment.
  Through local cleanups, habitat restoration, and outreach events, we work to
  restore ecosystems and build a lasting culture of environmental
  responsibility. Made by students, for students, we're proving that the next
  generation of conservation leaders is already at work.
whatWeDo:
  - heading: Community Cleanups
    body: >-
      We organize regular cleanups across Loudoun County parks, trails, and
      waterways. From neighborhood streams to county-wide events, our volunteers
      work hands-on to restore natural spaces.
  - heading: Student Research
    body: >-
      Our research division conducts original environmental science studies -
      investigating water quality, dissolved oxygen, nutrient runoff, and
      ecosystem health - and publishes findings for public access.
  - heading: Education & Outreach
    body: >-
      We empower the next generation of conservation leaders through school
      chapters, workshops, and community engagement events that connect students
      to the natural world around them.
  - heading: Policy & Advocacy
    body: >-
      By partnering with local parks, schools, and organizations, we amplify our
      impact and help shape environmental stewardship culture across Northern
      Virginia.
